<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maui Compass Map</title>
  <meta name="description" content="A clean OpenStreetMap-based Maui map with curated local places." />
  <link rel="preconnect" href="https://tile.openstreetmap.org" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --ink: #172426;
      --muted: #647477;
      --line: rgba(23,36,38,.13);
      --panel: rgba(255,255,255,.94);
      --blue: #0f6f82;
      --blue2: #084d5b;
      --sand: #f5efe3;
      --shadow: 0 16px 48px rgba(5,32,38,.18);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body, #app { height: 100%; margin: 0; }
    body { overflow: hidden; background: #d7e5e8; color: var(--ink); }
    button, input { font: inherit; }

    #map { position: fixed; inset: 0; z-index: 0; background: #c7dde2; }

    .leaflet-control-zoom { border: 0 !important; box-shadow: var(--shadow); }
    .leaflet-control-zoom a { border-color: var(--line) !important; color: var(--ink) !important; }
    .leaflet-control-attribution {
      background: rgba(255,255,255,.78) !important;
      backdrop-filter: blur(10px);
      border-radius: 10px 0 0 0;
      font-size: 11px;
    }

    .top {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(280px, 420px) 1fr auto;
      gap: 10px;
      pointer-events: none;
      align-items: start;
    }

    .searchbar, .chips, .tools, .drawer, .detail {
      pointer-events: auto;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.76);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px) saturate(130%);
      -webkit-backdrop-filter: blur(16px) saturate(130%);
    }

    .searchbar {
      height: 52px;
      border-radius: 18px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 0 12px 0 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      white-space: nowrap;
      font-weight: 900;
      letter-spacing: -.02em;
      padding-right: 8px;
      border-right: 1px solid var(--line);
    }
    .brand-dot {
      width: 24px; height: 24px; border-radius: 8px;
      background: linear-gradient(145deg, #0e7c8c, #073e49);
      box-shadow: inset 0 -5px 10px rgba(255,255,255,.16);
      position: relative;
    }
    .brand-dot::after {
      content: ""; position: absolute; inset: 6px; border: 2px solid #fff; border-left-color: transparent; border-bottom-color: transparent; transform: rotate(45deg); border-radius: 3px;
    }
    #q {
      width: 100%; height: 48px; border: 0; outline: 0; background: transparent;
      color: var(--ink); font-weight: 650; min-width: 0;
    }
    #q::placeholder { color: #7b8c8f; font-weight: 600; }
    .count { color: var(--muted); font-size: 13px; font-weight: 800; white-space: nowrap; }

    .chips {
      min-height: 52px;
      border-radius: 18px;
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 7px;
      overflow-x: auto;
    }
    .chip, .toolbtn, .row {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.82);
      color: var(--ink);
      cursor: pointer;
    }
    .chip {
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 850;
      white-space: nowrap;
    }
    .chip.active { background: var(--blue2); border-color: var(--blue2); color: #fff; }

    .tools { border-radius: 18px; display: flex; gap: 6px; padding: 7px; }
    .toolbtn { border-radius: 13px; padding: 9px 11px; font-size: 13px; font-weight: 850; white-space: nowrap; }

    .drawer {
      position: fixed;
      z-index: 9;
      left: 16px;
      top: 82px;
      width: 370px;
      max-width: calc(100vw - 32px);
      max-height: calc(100dvh - 112px);
      overflow: auto;
      border-radius: 20px;
      padding: 8px;
    }
    .drawer-head {
      padding: 8px 10px 10px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-weight: 900;
      display: flex;
      justify-content: space-between;
    }
    .row {
      width: 100%;
      border-radius: 16px;
      display: grid;
      grid-template-columns: 34px 1fr auto;
      gap: 10px;
      align-items: center;
      margin: 5px 0;
      padding: 10px;
      text-align: left;
      transition: transform .14s ease, background .14s ease, border-color .14s ease;
    }
    .row:hover { transform: translateY(-1px); background: #fff; }
    .row.active { background: #f6fbfc; border-color: rgba(15,111,130,.36); }
    .emoji { width: 34px; height: 34px; border-radius: 12px; display: grid; place-items: center; background: var(--sand); }
    .row strong { display: block; font-size: 14px; letter-spacing: -.01em; }
    .row span { display: block; color: var(--muted); font-size: 12.5px; margin-top: 2px; }
    .dist { color: var(--muted); font-size: 12px; font-weight: 800; }

    .detail {
      position: fixed;
      z-index: 10;
      right: 16px;
      bottom: 16px;
      width: 380px;
      max-width: calc(100vw - 32px);
      border-radius: 22px;
      padding: 16px;
    }
    .detail .meta { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 10px; }
    .pill { border: 1px solid var(--line); background: #fff; border-radius: 999px; padding: 5px 8px; font-size: 12px; font-weight: 800; color: #405255; }
    .detail h2 { margin: 0; font-size: 22px; letter-spacing: -.035em; line-height: 1.08; }
    .detail p { margin: 8px 0 13px; color: var(--muted); line-height: 1.42; font-size: 14px; }
    .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .linkbtn { text-decoration: none; display: inline-flex; align-items: center; border-radius: 999px; padding: 9px 12px; font-size: 13px; font-weight: 900; border: 1px solid var(--line); background: #fff; color: var(--ink); }
    .linkbtn.primary { background: var(--blue2); color: white; border-color: var(--blue2); }

    .marker {
      width: 30px; height: 30px; border-radius: 50% 50% 50% 9px;
      transform: rotate(-45deg);
      display: grid; place-items: center;
      color: white; background: var(--blue);
      border: 2px solid white;
      box-shadow: 0 7px 18px rgba(0,0,0,.28);
    }
    .marker span { transform: rotate(45deg); font-size: 15px; }
    .marker.beach { background: #d39424; }
    .marker.food { background: #d66f3f; }
    .marker.ocean { background: #08788a; }
    .marker.land { background: #4f7f48; }
    .marker.rain { background: #59636f; }
    .marker.active { outline: 4px solid rgba(242,169,59,.45); transform: rotate(-45deg) scale(1.18); }

    .empty { padding: 18px 12px 14px; color: var(--muted); font-size: 14px; line-height: 1.4; }

    @media (max-width: 880px) {
      .top { grid-template-columns: 1fr; right: 10px; left: 10px; top: 10px; gap: 8px; }
      .searchbar { height: 48px; border-radius: 16px; }
      .brand { font-size: 14px; }
      .chips { min-height: 46px; border-radius: 16px; }
      .tools { position: fixed; right: 10px; top: 116px; flex-direction: column; }
      .drawer {
        left: 10px; right: 10px; top: auto; bottom: 10px;
        width: auto; max-width: none; max-height: 30dvh;
        border-radius: 20px;
      }
      .detail {
        left: 10px; right: 10px; bottom: calc(30dvh + 20px);
        width: auto;
        padding: 13px;
      }
      .detail h2 { font-size: 19px; }
      .detail p { display: none; }
      .leaflet-control-zoom { display: none; }
    }

    @media (max-width: 520px) {
      .brand span { display: none; }
      .searchbar { grid-template-columns: auto 1fr auto; }
      .count { font-size: 12px; }
      .drawer-head { display: none; }
      .drawer { max-height: 27dvh; }
      .detail { bottom: calc(27dvh + 18px); }
      .row { grid-template-columns: 30px 1fr; }
      .dist { display: none; }
    }
  </style>
</head>
<body>
  <main id="app" aria-label="Maui Compass map">
    <div id="map" role="application" aria-label="OpenStreetMap map of Maui"></div>

    <section class="top" aria-label="Map controls">
      <label class="searchbar">
        <span class="brand"><span class="brand-dot" aria-hidden="true"></span><span>Maui Compass</span></span>
        <input id="q" type="search" autocomplete="off" placeholder="Search Maui places" />
        <span class="count" id="count">0</span>
      </label>

      <nav class="chips" aria-label="Place categories">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="beach">Beaches</button>
        <button class="chip" data-filter="food">Food</button>
        <button class="chip" data-filter="ocean">Ocean</button>
        <button class="chip" data-filter="land">Land</button>
        <button class="chip" data-filter="rain">Rainy day</button>
      </nav>

      <div class="tools" aria-label="Map actions">
        <button class="toolbtn" id="fit">Fit Maui</button>
        <button class="toolbtn" id="clear">Reset</button>
      </div>
    </section>

    <aside class="drawer" aria-label="Visible places">
      <div class="drawer-head"><span>Places</span><span id="drawerCount">0 shown</span></div>
      <div id="results"></div>
    </aside>

    <article class="detail" id="detail" aria-live="polite"></article>
  </main>

  <script>
    const places = [
      { id:'kaanapali', name:'Kāʻanapali Beach', cat:'beach', icon:'🏖️', area:'West Maui', lat:20.9219, lng:-156.6947, note:'Long sandy beach, resort path, sunset views.' },
      { id:'napili', name:'Napili Bay', cat:'beach', icon:'🏖️', area:'West Maui', lat:20.9945, lng:-156.6675, note:'Protected bay with a relaxed beach feel.' },
      { id:'wailea', name:'Wailea Beach', cat:'beach', icon:'🌅', area:'South Maui', lat:20.6897, lng:-156.4419, note:'Clean South Maui beach with an easy ocean walk.' },
      { id:'makena', name:'Mākena Big Beach', cat:'beach', icon:'🌊', area:'South Maui', lat:20.6312, lng:-156.4461, note:'Wide open beach, big shorebreak, dramatic scenery.' },
      { id:'hookipa', name:'Hoʻokipa Beach Park', cat:'beach', icon:'🐢', area:'North Shore', lat:20.9339, lng:-156.3570, note:'Surf, wind, turtles, and a classic North Shore overlook.' },
      { id:'molokini', name:'Molokini Crater', cat:'ocean', icon:'🐠', area:'Offshore', lat:20.6330, lng:-156.4960, note:'Morning snorkel destination off South Maui.' },
      { id:'maalaea', name:'Māʻalaea Harbor', cat:'ocean', icon:'⛵', area:'Central Maui', lat:20.7908, lng:-156.5124, note:'Harbor for snorkel boats, whale watches, and ocean tours.' },
      { id:'haleakala', name:'Haleakalā Summit', cat:'land', icon:'🌋', area:'Upcountry', lat:20.7097, lng:-156.2533, note:'High-elevation volcano summit and national park viewpoints.' },
      { id:'iao', name:'ʻĪao Valley', cat:'land', icon:'🌿', area:'Central Maui', lat:20.8819, lng:-156.5450, note:'Short nature stop in a steep green valley.' },
      { id:'hana', name:'Hāna Town', cat:'land', icon:'🛣️', area:'East Maui', lat:20.7557, lng:-155.9890, note:'Remote East Maui town at the far side of the Hāna drive.' },
      { id:'waihee', name:'Waiheʻe Ridge Trail', cat:'land', icon:'🥾', area:'West Maui Mountains', lat:20.9532, lng:-156.5326, note:'Ridge hike with big windward views.' },
      { id:'nalu', name:'Nalu’s South Shore Grill', cat:'food', icon:'🍽️', area:'Kīhei', lat:20.7476, lng:-156.4497, note:'Casual South Maui food stop.' },
      { id:'paia', name:'Pāʻia Town', cat:'food', icon:'☕', area:'North Shore', lat:20.9033, lng:-156.3697, note:'Small-town food, coffee, shops, and North Shore access.' },
      { id:'makawao', name:'Makawao Town', cat:'food', icon:'🥐', area:'Upcountry', lat:20.8569, lng:-156.3131, note:'Upcountry town with cafes, galleries, and paniolo character.' },
      { id:'ocean-center', name:'Maui Ocean Center', cat:'rain', icon:'🐢', area:'Māʻalaea', lat:20.7910, lng:-156.5127, note:'Aquarium and reliable rainy-day stop.' },
      { id:'queen', name:'Queen Kaʻahumanu Center', cat:'rain', icon:'🛍️', area:'Kahului', lat:20.8899, lng:-156.4750, note:'Indoor mall option in Central Maui.' }
    ];

    const colors = { beach:'#d39424', food:'#d66f3f', ocean:'#08788a', land:'#4f7f48', rain:'#59636f' };
    const labels = { beach:'Beach', food:'Food', ocean:'Ocean', land:'Land', rain:'Rainy day' };
    let filter = 'all';
    let query = '';
    let selected = 'wailea';
    const markers = new Map();

    const map = L.map('map', { zoomControl: true, preferCanvas: true }).setView([20.80, -156.40], 10);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);
    const bounds = L.latLngBounds(places.map(p => [p.lat, p.lng]));

    function plain(text) {
      return text.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    function visible() {
      const q = plain(query.trim());
      return places.filter(p => {
        const catOk = filter === 'all' || p.cat === filter;
        const text = plain(`${p.name} ${p.area} ${p.note} ${labels[p.cat]}`);
        return catOk && (!q || text.includes(q));
      });
    }

    function markerIcon(place) {
      return L.divIcon({
        className: '',
        html: `<div class="marker ${place.cat} ${place.id === selected ? 'active' : ''}" style="background:${colors[place.cat]}"><span>${place.icon}</span></div>`,
        iconSize: [34, 34],
        iconAnchor: [17, 30],
        popupAnchor: [0, -28]
      });
    }

    function renderMarkers() {
      const ids = new Set(visible().map(p => p.id));
      places.forEach(place => {
        if (!markers.has(place.id)) {
          const marker = L.marker([place.lat, place.lng], { icon: markerIcon(place), title: place.name })
            .on('click', () => select(place.id, true));
          markers.set(place.id, marker);
        }
        const marker = markers.get(place.id);
        marker.setIcon(markerIcon(place));
        if (ids.has(place.id)) {
          if (!map.hasLayer(marker)) marker.addTo(map);
        } else if (map.hasLayer(marker)) {
          map.removeLayer(marker);
        }
      });
    }

    function renderResults() {
      const list = visible();
      document.getElementById('count').textContent = `${list.length}`;
      document.getElementById('drawerCount').textContent = `${list.length} shown`;
      const root = document.getElementById('results');
      if (!list.length) {
        root.innerHTML = '<div class="empty">No places match this map view. Clear the search or reset filters.</div>';
        return;
      }
      root.innerHTML = list.map(place => `
        <button class="row ${place.id === selected ? 'active' : ''}" data-id="${place.id}">
          <span class="emoji">${place.icon}</span>
          <span><strong>${place.name}</strong><span>${labels[place.cat]} · ${place.area}</span></span>
          <span class="dist">${place.lat.toFixed(2)}, ${place.lng.toFixed(2)}</span>
        </button>`).join('');
      root.querySelectorAll('.row').forEach(row => row.addEventListener('click', () => select(row.dataset.id, true)));
    }

    function renderDetail() {
      const list = visible();
      const place = places.find(p => p.id === selected && list.some(v => v.id === p.id)) || list[0];
      const el = document.getElementById('detail');
      if (!place) {
        el.innerHTML = `<div class="meta"><span class="pill">No results</span></div><h2>No places shown</h2><p>Clear search or reset filters.</p><div class="detail-actions"><button class="linkbtn primary" id="emptyReset">Reset map</button></div>`;
        document.getElementById('emptyReset').addEventListener('click', reset);
        return;
      }
      selected = place.id;
      el.innerHTML = `
        <div class="meta"><span class="pill">${place.icon} ${labels[place.cat]}</span><span class="pill">${place.area}</span></div>
        <h2>${place.name}</h2>
        <p>${place.note}</p>
        <div class="detail-actions">
          <a class="linkbtn primary" target="_blank" rel="noopener" href="https://www.openstreetmap.org/?mlat=${place.lat}&mlon=${place.lng}#map=15/${place.lat}/${place.lng}">Open in OSM</a>
          <a class="linkbtn" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=${place.lat},${place.lng}">Google Maps</a>
        </div>`;
    }

    function select(id, pan) {
      selected = id;
      const place = places.find(p => p.id === id);
      renderMarkers();
      renderResults();
      renderDetail();
      if (pan && place) map.flyTo([place.lat, place.lng], Math.max(12, map.getZoom()), { duration: .45 });
    }

    function apply({fit=false}={}) {
      const list = visible();
      if (list.length && !list.some(p => p.id === selected)) selected = list[0].id;
      renderMarkers();
      renderResults();
      renderDetail();
      if (fit && list.length) map.fitBounds(L.latLngBounds(list.map(p => [p.lat, p.lng])), { padding: [70, 70], maxZoom: 12 });
    }

    function reset() {
      filter = 'all'; query = ''; selected = 'wailea';
      document.getElementById('q').value = '';
      document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.filter === 'all'));
      apply({fit:true});
    }

    document.getElementById('q').addEventListener('input', e => {
      query = e.target.value;
      if (query.trim()) {
        filter = 'all';
        document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.filter === 'all'));
      }
      apply({fit:false});
    });
    document.querySelectorAll('.chip').forEach(chip => chip.addEventListener('click', () => {
      filter = chip.dataset.filter;
      document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === chip));
      apply({fit:true});
    }));
    document.getElementById('fit').addEventListener('click', () => map.fitBounds(bounds, { padding: [55, 55] }));
    document.getElementById('clear').addEventListener('click', reset);

    apply({fit:true});
    setTimeout(() => map.invalidateSize(), 100);
  </script>
</body>
</html>
